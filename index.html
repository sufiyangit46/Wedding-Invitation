<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="playMusic()">🎵 Play Music</button>

<!-- HERO -->
<section class="hero">

<h1>You're Invited</h1>

<h2>Ahmed ❤️ Ayesha</h2>

<p>Join us for our wedding celebration</p>

<h3>20 December 2026</h3>

</section>

<!-- COUNTDOWN -->

<section class="countdown">

<h2>Wedding Countdown</h2>

<div id="timer"></div>

</section>

<!-- GALLERY -->

<section class="gallery">

<h2>Our Memories</h2>

<div class="grid">

<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">
<img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57">

</div>

</section>

<!-- EVENT -->

<section class="event">

<h2>Wedding Details</h2>

<p>📍 Taj Hotel, Mumbai</p>

<p>🕒 7:00 PM</p>

<p>📅 20 December 2026</p>

</section>

<footer>

<p>Made with ❤️ and Code</p>

</footer>

<script src="script.js"></script>

</body>
</html>
